<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Área Privada</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{text-align:center;padding:3rem;background:rgba(255,255,255,.05);border-radius:24px;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px)}
h1{font-size:2.5rem;margin-bottom:1rem;background:linear-gradient(135deg,#22c55e,#16a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.email{font-size:1.2rem;color:#94a3b8;margin:1.5rem 0}
button{padding:12px 40px;border:none;border-radius:12px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:1rem;cursor:pointer;transition:.3s}
button:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(239,68,68,.4)}
</style></head>
<body>
<div class="card">
  <h1>✅ Bienvenido</h1>
  <p>Has iniciado sesión como:</p>
  <p class="email">{{usuarioEmail}}</p>
  <button onclick="window.location.href='/salir'">Cerrar Sesión</button>
</div>
</body></html>
